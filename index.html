<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckYourWrite — Almanca Metin Düzeltici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0da; --text: #1a1916; --muted: #8a8880;
    --green: #2d6a4f; --green-light: #e8f4ee; --red: #9b2335; --red-light: #fbeaec;
    --amber: #7a4f00; --amber-light: #fdf3dc; --blue: #1a4d8f; --blue-light: #e8eef9;
    --pink: #8f1a5a; --pink-light: #f9e8f2; --radius: 10px;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  header { padding: 1.25rem 2rem; display: flex; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--mono); font-size: 14px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }
  .logo span { color: var(--muted); }
  main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem; }
  .intro { margin-bottom: 1.75rem; }
  .intro h1 { font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 4px; letter-spacing: -0.02em; }
  .intro p { font-size: 13px; color: var(--muted); }
  .level-row { display: flex; align-items: center; gap: 6px; margin-bottom: 0.85rem; }
  .level-label { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-right: 2px; }
  .lvl { padding: 3px 11px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-family: var(--mono); cursor: pointer; background: transparent; color: var(--muted); transition: all 0.12s; }
  .lvl:hover { color: var(--text); border-color: #bbb; }
  .lvl.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  .input-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; transition: border-color 0.15s; }
  .input-box:focus-within { border-color: #bbb; }
  textarea { width: 100%; height: 200px; padding: 16px; font-family: var(--sans); font-size: 15px; line-height: 1.75; border: none; outline: none; resize: none; background: transparent; color: var(--text); }
  textarea::placeholder { color: #bbb; }
  .input-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-top: 1px solid var(--border); }
  .char-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .clear-btn { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: var(--sans); }
  .clear-btn:hover { color: var(--text); }
  .submit-btn { width: 100%; padding: 11px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .submit-btn:hover { opacity: 0.82; }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .loading-row { display: none; align-items: center; gap: 10px; padding: 1.25rem 0; color: var(--muted); font-size: 13px; }
  .spinner { width: 15px; height: 15px; border: 1.5px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.65s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }
  .result-section { display: none; }
  .result-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .corrected-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 1.5rem; white-space: pre-wrap; }
  .stats-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .stat strong { color: var(--text); font-weight: 500; }
  .err-list { display: flex; flex-direction: column; gap: 7px; }
  .err-item { display: grid; grid-template-columns: 8px 1fr; gap: 12px; align-items: start; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px 12px 10px; }
  .err-stripe { width: 3px; height: 100%; border-radius: 3px; min-height: 36px; }
  .stripe-gram { background: var(--red); } .stripe-spell { background: var(--blue); } .stripe-punct { background: var(--amber); } .stripe-case { background: var(--pink); }
  .err-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .err-type { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 4px; }
  .type-gram { background: var(--red-light); color: var(--red); } .type-spell { background: var(--blue-light); color: var(--blue); } .type-punct { background: var(--amber-light); color: var(--amber); } .type-case { background: var(--pink-light); color: var(--pink); }
  .err-orig { font-size: 14px; text-decoration: line-through; color: #bbb; font-family: var(--mono); }
  .err-arrow { color: #ccc; font-size: 12px; }
  .err-fix { font-size: 14px; font-weight: 500; font-family: var(--mono); color: var(--text); }
  .err-explain { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .no-errors { background: var(--green-light); border: 1px solid #b7d9c5; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--green); font-weight: 500; }
  .copy-btn { margin-top: 8px; padding: 6px 14px; font-size: 12px; font-family: var(--sans); border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; }
  .copy-btn:hover { color: var(--text); border-color: #bbb; }
  footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  @media (max-width: 520px) { header { padding: 1rem; } main { padding: 1.25rem 1rem; } }
.about-section { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 2rem; }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 560px) { .about-grid { grid-template-columns: 1fr; } }
.about-text h2 { font-size: 16px; font-weight: 500; margin-bottom: 0.75rem; }
.about-text p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 0.5rem; }
.about-text .maker { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 1rem; }
.yt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; text-decoration: none; display: block; transition: border-color 0.15s; }
.yt-card:hover { border-color: #e00; }
.yt-thumb { width: 100%; aspect-ratio: 16/9; background: #1a1916; display: flex; align-items: center; justify-content: center; }
.yt-info { padding: 12px 14px; }
.yt-info p { font-size: 12px; color: var(--muted); margin-top: 3px; }
.yt-info strong { font-size: 13px; color: var(--text); }
.usage-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.usage-left { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.usage-count { font-family: var(--mono); font-size: 11px; }
.usage-count.green { color: var(--green); }
.usage-count.amber { color: var(--amber); }
.usage-count.red { color: var(--red); }
.usage-reset { font-family: var(--mono); font-size: 10px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="logo">check<span>your</span>write</div>
</header>
<main>
  <div class="intro">
    <h1>Almanca metninizi düzeltin</h1>
    <p>Gramer, yazım, noktalama ve büyük/küçük harf hatalarını analiz eder.</p>
  </div>
  <div class="level-row">
    <span class="level-label">seviye</span>
    <button class="lvl" onclick="setLvl(this,'A2')">A2</button>
    <button class="lvl" onclick="setLvl(this,'B1')">B1</button>
    <button class="lvl on" onclick="setLvl(this,'B2')">B2</button>
    <button class="lvl" onclick="setLvl(this,'C1')">C1</button>
    <button class="lvl" onclick="setLvl(this,'C2')">C2</button>
  </div>
  <div class="input-box">
    <textarea id="inputText" placeholder="Almanca metninizi buraya yazın veya yapıştırın..." oninput="onType()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 karakter</span>
      <button class="clear-btn" onclick="clearText()">Temizle</button>
    </div>
  </div>
  <div class="usage-bar">
  <span class="usage-left">Günlük kullanım</span>
  <span class="usage-count" id="usageCount">15 / 15 hak kaldı</span>
  <span class="usage-reset" id="usageReset">24 saatte 15 hak</span>
</div>
 <div style="display:flex;gap:10px;align-items:center;">
  <button class="submit-btn" id="submitBtn" onclick="analyze()" style="flex:1;">Düzelt →</button>
  <a href="https://www.youtube.com/@yusufunvloglar%C4%B1" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:#ff0000;border-radius:10px;flex-shrink:0;text-decoration:none;">
    <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19.6 2.2C19.4 1.5 18.8 0.9 18.1 0.7C16.5 0.3 10 0.3 10 0.3C10 0.3 3.5 0.3 1.9 0.7C1.2 0.9 0.6 1.5 0.4 2.2C0 3.8 0 7 0 7C0 7 0 10.2 0.4 11.8C0.6 12.5 1.2 13.1 1.9 13.3C3.5 13.7 10 13.7 10 13.7C10 13.7 16.5 13.7 18.1 13.3C18.8 13.1 19.4 12.5 19.6 11.8C20 10.2 20 7 20 7C20 7 20 3.8 19.6 2.2Z" fill="white"/><path d="M8 10L13 7L8 4V10Z" fill="#ff0000"/></svg>
  </a>
</div>
  <div class="loading-row" id="loadingRow">
    <div class="spinner"></div>
    <span>Metin analiz ediliyor...</span>
  </div>
  <div class="result-section" id="resultSection">
    <hr class="divider">
    <div class="result-label">Düzeltilmiş metin</div>
    <div class="corrected-box" id="correctedBox"></div>
    <button class="copy-btn" onclick="copyText()">Kopyala</button>
    <hr class="divider">
    <div class="result-label" style="margin-bottom: 10px;">Hatalar</div>
    <div class="stats-row" id="statsRow"></div>
    <div class="err-list" id="errList"></div>
  </div>
</main>
    </a>
  </div>
</div>
 
<script>
let level = 'B2';
function setLvl(btn, v) { document.querySelectorAll('.lvl').forEach(b => b.classList.remove('on')); btn.classList.add('on'); level = v; }
function onType() { document.getElementById('charCount').textContent = document.getElementById('inputText').value.length + ' karakter'; }
function clearText() { document.getElementById('inputText').value = ''; document.getElementById('charCount').textContent = '0 karakter'; document.getElementById('resultSection').style.display = 'none'; }
function copyText() { navigator.clipboard.writeText(document.getElementById('correctedBox').textContent).then(() => { const btn = document.querySelector('.copy-btn'); btn.textContent = 'Kopyalandı ✓'; setTimeout(() => btn.textContent = 'Kopyala', 1800); }); }
async function analyze() {
  const text = document.getElementById('inputText').value.trim();
const usage = getUsage();
if (usage.count >= MAX_DAILY) {
  const resetIn = Math.ceil((usage.start + 24 * 60 * 60 * 1000 - Date.now()) / (60 * 60 * 1000));
  alert('Günlük kullanım limitine ulaştınız (15/15). ' + resetIn + ' saat sonra tekrar kullanabilirsiniz.');
  return;
}
  if (!text) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('loadingRow').style.display = 'flex';
  document.getElementById('resultSection').style.display = 'none';
  try {
    const res = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, level }) });
    const result = await res.json();
    if (result.error) { alert('Hata: ' + result.error); return; }
    incrementUsage();
updateUsageBar();
   renderResult(result);
  } catch(e) { alert('Bir hata oluştu, tekrar dene.'); }
  finally { btn.disabled = false; document.getElementById('loadingRow').style.display = 'none'; }
}
function renderResult(r) {
  document.getElementById('correctedBox').textContent = r.corrected || '';
  const errors = r.errors || [];
  const typeMap = { gram: 'Gramer', spell: 'Yazım', punct: 'Noktalama', case: 'Büyük/Küçük Harf' };
  const dotColors = { gram: '#9b2335', spell: '#1a4d8f', punct: '#7a4f00', case: '#8f1a5a' };
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = '';
  const counts = { gram: 0, spell: 0, punct: 0, case: 0 };
  errors.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });
  Object.entries(counts).forEach(([type, count]) => {
    if (count === 0) return;
    const s = document.createElement('div'); s.className = 'stat';
    s.innerHTML = '<div class="stat-dot" style="background:' + dotColors[type] + '"></div><strong>' + count + '</strong> ' + typeMap[type];
    statsRow.appendChild(s);
  });
  const errList = document.getElementById('errList');
  errList.innerHTML = '';
  if (errors.length === 0) { errList.innerHTML = '<div class="no-errors">Hata bulunamadı — metin doğru görünüyor.</div>'; }
  else {
    errors.forEach(e => {
      const div = document.createElement('div'); div.className = 'err-item';
      div.innerHTML = '<div class="err-stripe stripe-' + e.type + '"></div><div><div class="err-top"><span class="err-type type-' + e.type + '">' + (typeMap[e.type]||e.type) + '</span><span class="err-orig">' + esc(e.original) + '</span><span class="err-arrow">→</span><span class="err-fix">' + esc(e.correction) + '</span></div><div class="err-explain">' + esc(e.explanation) + '</div></div>';
      errList.appendChild(div);
    });
  }
  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const MAX_DAILY = 15;

function getUsage() {
  const stored = localStorage.getItem('cyw_usage');
  if (!stored) return { count: 0, start: null };
  const data = JSON.parse(stored);
  if (data.start && Date.now() - data.start > 24 * 60 * 60 * 1000) {
    localStorage.removeItem('cyw_usage');
    return { count: 0, start: null };
  }
  return data;
}

function incrementUsage() {
  const data = getUsage();
  const updated = { count: data.count + 1, start: data.start || Date.now() };
  localStorage.setItem('cyw_usage', JSON.stringify(updated));
  return updated;
}

function updateUsageBar() {
  const data = getUsage();
  const remaining = MAX_DAILY - data.count;
  const el = document.getElementById('usageCount');
  const resetEl = document.getElementById('usageReset');
  el.textContent = remaining + ' / ' + MAX_DAILY + ' hak kaldı';
  el.className = 'usage-count ' + (remaining > 10 ? 'green' : remaining > 4 ? 'amber' : 'red');
  if (data.start) {
    const resetIn = Math.ceil((data.start + 24 * 60 * 60 * 1000 - Date.now()) / (60 * 60 * 1000));
    resetEl.textContent = resetIn + ' saat sonra yenilenir';
  } else {
    resetEl.textContent = '24 saatte 15 hak';
  }
}

updateUsageBar();
setInterval(updateUsageBar, 60000);
</script>
</body>
</html>
